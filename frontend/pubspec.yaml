name: notio_app
description: "AI-powered notification hub for developers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  hooks_riverpod: ^2.5.3
  flutter_hooks: ^0.20.5
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Network
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  json_annotation: ^4.9.0

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Push Notifications (Phase 4 - temporarily disabled for iOS compatibility)
  # firebase_core: ^2.27.2
  # firebase_messaging: ^14.7.20
  flutter_local_notifications: ^17.2.3

  # UI Components
  flutter_slidable: ^3.1.1
  fl_chart: ^0.68.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Utils
  timeago: ^3.6.1
  intl: ^0.19.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation - temporarily disabled due to analyzer_plugin compatibility issues
  # Will use manual implementation instead
  # riverpod_generator: ^2.6.2
  # build_runner: ^2.4.13
  # json_serializable: ^6.8.0
  # drift_dev: ^2.18.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
