services:
  # Spring Boot backend
  notio-backend:
    build:
      context: ../backend
    image: notio/backend:local
    container_name: notio-backend
    mem_limit: 768m
    environment:
      SPRING_PROFILES_ACTIVE: local
      NOTIO_DB_HOST: postgres
      NOTIO_DB_PORT: 5432
      NOTIO_DB_NAME: notio
      NOTIO_DB_USERNAME: notio
      NOTIO_DB_PASSWORD: notio
      NOTIO_REDIS_HOST: redis
      NOTIO_REDIS_PORT: 6379
      NOTIO_OLLAMA_URL: http://ollama:11434
      NOTIO_SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - notio-network

  # PostgreSQL 16 with pgvector
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: notio-postgres
    environment:
      POSTGRES_DB: notio
      POSTGRES_USER: notio
      POSTGRES_PASSWORD: notio
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - notio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notio"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: notio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - notio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Ollama for LLM
  ollama:
    image: ollama/ollama:latest
    container_name: notio-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - notio-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  notio-network:
    driver: bridge
