spring:
  application:
    name: notio-backend
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  datasource:
    url: jdbc:postgresql://${NOTIO_DB_HOST:localhost}:${NOTIO_DB_PORT:5432}/${NOTIO_DB_NAME:notio}
    username: ${NOTIO_DB_USERNAME:notio}
    password: ${NOTIO_DB_PASSWORD:notio}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${NOTIO_REDIS_HOST:localhost}
      port: ${NOTIO_REDIS_PORT:6379}
      password: ${NOTIO_REDIS_PASSWORD:}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${NOTIO_SERVER_PORT:8080}
  error:
    include-message: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    com.notio: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

# JWT
notio:
  jwt:
    secret: ${NOTIO_JWT_SECRET:your-256-bit-secret-key-change-this-in-production}
    expiration: 86400000 # 24 hours
  auth:
    password-reset:
      token-ttl: ${NOTIO_AUTH_PASSWORD_RESET_TOKEN_TTL:30m}
    mail:
      delivery-mode: ${NOTIO_AUTH_MAIL_DELIVERY_MODE:NOOP}
      from-address: ${NOTIO_AUTH_MAIL_FROM_ADDRESS:no-reply@notio.local}
      from-name: ${NOTIO_AUTH_MAIL_FROM_NAME:Notio}
      reset-link-base-url: ${NOTIO_AUTH_MAIL_RESET_LINK_BASE_URL:http://localhost:3000/reset-password/confirm}
    oauth:
      state-ttl: ${NOTIO_AUTH_OAUTH_STATE_TTL:5m}
      providers:
        google:
          client-id: ${NOTIO_AUTH_OAUTH_GOOGLE_CLIENT_ID:}
          client-secret: ${NOTIO_AUTH_OAUTH_GOOGLE_CLIENT_SECRET:}
          web-redirect-uri: ${NOTIO_AUTH_OAUTH_GOOGLE_WEB_REDIRECT_URI:}
          mobile-redirect-uri: ${NOTIO_AUTH_OAUTH_GOOGLE_MOBILE_REDIRECT_URI:}
        apple:
          client-id: ${NOTIO_AUTH_OAUTH_APPLE_CLIENT_ID:}
          client-secret: ${NOTIO_AUTH_OAUTH_APPLE_CLIENT_SECRET:}
          web-redirect-uri: ${NOTIO_AUTH_OAUTH_APPLE_WEB_REDIRECT_URI:}
          mobile-redirect-uri: ${NOTIO_AUTH_OAUTH_APPLE_MOBILE_REDIRECT_URI:}
        kakao:
          client-id: ${NOTIO_AUTH_OAUTH_KAKAO_CLIENT_ID:}
          client-secret: ${NOTIO_AUTH_OAUTH_KAKAO_CLIENT_SECRET:}
          web-redirect-uri: ${NOTIO_AUTH_OAUTH_KAKAO_WEB_REDIRECT_URI:}
          mobile-redirect-uri: ${NOTIO_AUTH_OAUTH_KAKAO_MOBILE_REDIRECT_URI:}
        naver:
          client-id: ${NOTIO_AUTH_OAUTH_NAVER_CLIENT_ID:}
          client-secret: ${NOTIO_AUTH_OAUTH_NAVER_CLIENT_SECRET:}
          web-redirect-uri: ${NOTIO_AUTH_OAUTH_NAVER_WEB_REDIRECT_URI:}
          mobile-redirect-uri: ${NOTIO_AUTH_OAUTH_NAVER_MOBILE_REDIRECT_URI:}
  webhook:
    slack:
      signing-secret: ${NOTIO_WEBHOOK_SLACK_SECRET:change-me}
    github:
      webhook-secret: ${NOTIO_WEBHOOK_GITHUB_SECRET:change-me}
  connection:
    security:
      webhook-key-pepper: ${NOTIO_WEBHOOK_KEY_PEPPER:local-dev-webhook-pepper-change-me}
      credential-encryption-key: ${NOTIO_CREDENTIAL_ENCRYPTION_KEY:}
  rate-limit:
    fail-open-profiles: ${NOTIO_RATE_LIMIT_FAIL_OPEN_PROFILES:local,dev,test}
    fail-closed-paths: ${NOTIO_RATE_LIMIT_FAIL_CLOSED_PATHS:/api/v1/webhook/**}
    webhook-body-max-bytes: ${NOTIO_RATE_LIMIT_WEBHOOK_BODY_MAX_BYTES:65536}
    json-body-max-bytes: ${NOTIO_RATE_LIMIT_JSON_BODY_MAX_BYTES:1048576}
    chat-max-chars: ${NOTIO_RATE_LIMIT_CHAT_MAX_CHARS:4000}
  firebase:
    enabled: ${NOTIO_FIREBASE_ENABLED:false}
    service-account-path: ${NOTIO_FIREBASE_SERVICE_ACCOUNT_PATH:}
